name: Draft bilingual release

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: Branch to compare with the latest stable tag
        required: true
        default: dev
        type: string
      base_tag:
        description: Optional base tag override
        required: false
        type: string
      version_override:
        description: Optional semantic version override, such as v2.10.0
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'models/gemini-2.5-flash' }}
      SOURCE_BRANCH: ${{ inputs.source_branch }}
      BASE_TAG: ${{ inputs.base_tag }}
      VERSION_OVERRIDE: ${{ inputs.version_override }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tooling
        run: npm test

      - name: Generate bilingual release draft
        shell: bash
        run: |
          if [[ -z "$GEMINI_API_KEY" ]]; then
            echo "GEMINI_API_KEY is not configured." >&2
            exit 1
          fi

          git show-ref --verify --quiet "refs/heads/$SOURCE_BRANCH" || git branch "$SOURCE_BRANCH" HEAD
          args=(--source "$SOURCE_BRANCH")
          if [[ -n "$BASE_TAG" ]]; then args+=(--base "$BASE_TAG"); fi
          if [[ -n "$VERSION_OVERRIDE" ]]; then args+=(--version "$VERSION_OVERRIDE"); fi
          npm run release:draft -- "${args[@]}"

      - name: Check generated artifacts
        run: npm run release:check

      - name: Commit release branch
        id: release
        shell: bash
        run: |
          version="v$(node -p "require('./package.json').version")"
          branch="automation/release-${version}"
          title="$(node -p "require('./assets/data/releases.json').releases[0].title.en")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add \
            assets/data/releases.json \
            CHANGELOG.md \
            CHANGELOG.ar.md \
            package.json \
            package-lock.json \
            version.js \
            service-worker.js \
            releases.html \
            ar/releases.html \
            README.md

          if git diff --cached --quiet; then
            echo "The draft produced no repository changes." >&2
            exit 1
          fi

          git commit -m "chore(release): prepare ${version}"
          git push --force-with-lease --set-upstream origin "$branch"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Open or update release pull request
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_BRANCH: ${{ steps.release.outputs.branch }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          existing="$(gh pr list --base main --head "$RELEASE_BRANCH" --state open --json url --jq '.[0].url')"
          if [[ -n "$existing" ]]; then
            echo "Updated existing release PR: $existing"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release ${RELEASE_VERSION}: ${RELEASE_TITLE}" \
            --body-file - <<EOF
          ## Automated bilingual release draft

          Generated from \`${BASE_TAG:-latest stable tag}..${SOURCE_BRANCH}\` using \`${GEMINI_MODEL}\`.

          Review the English and Arabic copy, evidence references, version recommendation, generated changelogs, and synchronized version files before merging.

          Publishing remains a separate manual action through the **Publish release** workflow.
          EOF
