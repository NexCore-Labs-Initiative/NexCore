name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to publish; defaults to the latest canonical release
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REQUESTED_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release is publishable
        run: |
          npm test
          npm run release:check

      - name: Resolve and validate version
        id: release
        shell: bash
        run: |
          latest="$(node -p "require('./assets/data/releases.json').releases[0].version")"
          package_version="v$(node -p "require('./package.json').version")"
          version="${REQUESTED_VERSION:-$latest}"
          [[ "$version" == v* ]] || version="v${version}"

          if [[ "$version" != "$latest" ]]; then
            echo "Requested version $version is not the latest canonical release $latest." >&2
            exit 1
          fi
          if [[ "$version" != "$package_version" ]]; then
            echo "Canonical version $version does not match package version $package_version." >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$version"; then
            echo "Tag $version already exists." >&2
            exit 1
          fi

          title="$(node -p "require('./assets/data/releases.json').releases[0].title.en")"
          node scripts/releases/notes.js --version "$version" --lang en --output "$RUNNER_TEMP/release-notes.md"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag and GitHub Release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_VERSION" -m "$RELEASE_VERSION - $RELEASE_TITLE"
          git push origin "$RELEASE_VERSION"
          gh release create "$RELEASE_VERSION" \
            --verify-tag \
            --title "$RELEASE_VERSION - $RELEASE_TITLE" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
