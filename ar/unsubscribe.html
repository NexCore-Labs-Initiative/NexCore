    <style>
        body {

        }

        img {
            filter: drop-shadow(0 0 25px rgba(110, 231, 243, 1)) opacity(0.3);
        }

        main {
            opacity: 1;
            user-select: none;
            text-align: center;
            display: block;
            position: absolute;
            width: 80%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        main div {
            box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
            padding: 18px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            margin: auto;
        }

        .subscribe-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 8px;
            margin: 18px 0;
        }

        .subscribe-box input {
            margin-bottom: 0;
        }

        hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 18px 0;
        }

        @media screen and (max-width: 700px) {
            .subscribe-box {
                flex-direction: column;
                gap: 16px;
            }
        }

    <div class="background">

            <form id="unsubscribe-form" class="subscribe-box">
                <input type="email" id="unsubscribe-email" placeholder="أدخل بريدك الإلكتروني" autocomplete="email" required>
                <button type="submit" id="confirm" class="btn primary">إلغاء الاشتراك</button>
            </form>

            <hr>

            <a href="index.html" class="btn ghost">العودة للرئيسية <i class="fa-solid fa-arrow-left"></i></a>
